# Relay CI (DESIGN.md §12). Fast, dependency-light: the unit suite is the gate,
# plus ruff lint and `buf lint` on the proto so the wire format can't drift.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (dev + bench)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[bench,dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Unit tests
        run: python -m pytest tests/unit -q

  proto-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - name: buf lint
        run: buf lint
        working-directory: proto
      - name: buf breaking (vs main)
        run: buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main,subdir=proto"
        working-directory: proto
        continue-on-error: true
