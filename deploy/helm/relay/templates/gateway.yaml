apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    {{- include "relay.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: relay
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relay
        app.kubernetes.io/component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.gateway.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: "{{ include "relay.image" . }}-gateway"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "services.gateway.app"]
          ports:
            - containerPort: {{ .Values.gateway.port }}
          env:
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: PG_DSN
              value: {{ .Values.postgres.dsn | quote }}
            - name: SCHEDULER_ADDR
              value: "{{ .Release.Name }}-scheduler:{{ .Values.scheduler.grpcPort }}"
            - name: PORT
              value: "{{ .Values.gateway.port }}"
          readinessProbe:
            httpGet: { path: /readyz, port: {{ .Values.gateway.port }} }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.gateway.port }} }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources: {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    {{- include "relay.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  selector:
    app.kubernetes.io/name: relay
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
  type: ClusterIP
