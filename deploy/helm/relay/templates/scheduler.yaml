apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-scheduler
  labels:
    {{- include "relay.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: relay
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relay
        app.kubernetes.io/component: scheduler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.scheduler.metricsPort }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: scheduler
          image: "{{ include "relay.image" . }}-scheduler"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "services.scheduler.server"]
          ports:
            - { name: grpc, containerPort: {{ .Values.scheduler.grpcPort }} }
            - { name: metrics, containerPort: {{ .Values.scheduler.metricsPort }} }
          env:
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: PG_DSN
              value: {{ .Values.postgres.dsn | quote }}
            - name: RELAY_GRPC_PORT
              value: "{{ .Values.scheduler.grpcPort }}"
            - name: RELAY_METRICS_PORT
              value: "{{ .Values.scheduler.metricsPort }}"
            - name: RELAY_ROUTING_POLICY
              value: {{ .Values.scheduler.routing.policy | quote }}
            - name: RELAY_LOAD_CAP_FACTOR
              value: {{ .Values.scheduler.routing.loadCapFactor | quote }}
          resources: {{- toYaml .Values.scheduler.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-scheduler
  labels:
    {{- include "relay.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  selector:
    app.kubernetes.io/name: relay
    app.kubernetes.io/component: scheduler
  ports:
    - { name: grpc, port: {{ .Values.scheduler.grpcPort }}, targetPort: grpc }
    - { name: metrics, port: {{ .Values.scheduler.metricsPort }}, targetPort: metrics }
  type: ClusterIP
