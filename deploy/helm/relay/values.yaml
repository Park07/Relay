# Default values for the Relay chart (DESIGN.md §11 Phase 3, ADR-9).
# The headline here is `worker.hpa`: workers autoscale on the custom
# relay_queue_depth metric (via prometheus-adapter), NOT CPU — "autoscale
# stateless GPU workers on a business metric" is the K8s skill the target JDs want.

image:
  repository: relay
  pullPolicy: IfNotPresent
  tag: "0.1.0"

redis:
  url: redis://relay-redis:6379/0
postgres:
  dsn: postgresql://relay:relay@relay-postgres:5432/relay

gateway:
  replicas: 2
  port: 8080
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }

scheduler:
  # Single scheduler in this chart (the control plane is stateful-ish; HA is a
  # documented follow-up, ADR notes). gRPC + metrics ports exposed.
  grpcPort: 50051
  metricsPort: 9101
  routing:
    policy: bounded          # bounded | affinity | round_robin
    loadCapFactor: "1.5"     # the Pareto knob (DESIGN.md §8.2 / §13.2)
  resources:
    requests: { cpu: "250m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }

worker:
  engine: mock               # mock | cache-aware-mock | ollama | torch-mps | vllm
  models: "qwen2.5:0.5b"
  metricsPort: 9102
  maxBatch: 16
  maxConcurrentBatches: 4
  resources:
    requests: { cpu: "250m", memory: "256Mi" }
    limits:   { cpu: "2",    memory: "1Gi" }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    # Scale so each worker carries ~25 queued items; cross it and HPA adds pods.
    targetQueueDepthPerPod: "25"
